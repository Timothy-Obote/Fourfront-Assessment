<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Cards</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- WHITE OUTER CONTAINER -->
    <div class="outer-container">

        <!-- Menu toggle functionality-->
        

        <!-- DARK GREY BOX 1 (TOP) -->
        <div class="dark-grey-box top-box">
            <!-- Michael section -->
            <div class="michael-section golden-border">
                <img src="images/1.jpeg" alt="Michael" class="profile-img">
                <div class="michael-text">
                    <h2 class="profile-name">Michael</h2>
                    <p class="club-message">You’ve officially joined your first investment knowledge club!</p>
                </div>
            </div>

            <!-- 2x2 colored boxes -->
            <div class="colored-boxes container-fluid">
                <div class="row g-2">
                    <div class="col-6">
                        <div class="color-box pink-box">
                            <img src="images/3.jpeg" alt="profile" class="box-profile-img">
                            <div class="box-text">
                                <span class="member-name">Bernard Makodingo</span>
                                <span class="member-points">350</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="color-box green-box">
                            <img src="images/4.jpeg" alt="profile" class="box-profile-img">
                            <div class="box-text">
                                <span class="member-name">kigSmall Foot</span>
                                <span class="member-points">225</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="color-box yellow-box">
                            <img src="images/2.jpeg" alt="profile" class="box-profile-img">
                            <div class="box-text">
                                <span class="member-name">Caroline Likholl</span>
                                <span class="member-points">117</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="color-box pink-box">
                            <img src="images/55.jpeg" alt="profile" class="box-profile-img">
                            <div class="box-text">
                                <span class="member-name">Caro Line</span>
                                <span class="member-points">321</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div> <!-- end dark-grey-box 1 -->

        

    </div> <!-- end outer-container -->
</body>
</html>
